version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: nest-bookmarks
    ports:
      - "5432:5432"
    networks:
      - tutorial
    volumes:
      - postgres_data:/var/lib/postgresql/data

networks:
  tutorial:

volumes:
  postgres_data: